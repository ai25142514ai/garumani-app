name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json
          from bs4 import BeautifulSoup
          import time
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9","Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"}
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)
          res=session.get("https://www.dlsite.com/girls-touch/ranking/day",timeout=30)
          res.encoding="utf-8"
          soup=BeautifulSoup(res.text,"lxml")
          # scriptタグ内のJSONデータを探す
          for sc in soup.find_all("script"):
            t=sc.string or ""
            # RJ番号とwork_nameが両方含まれるscriptを探す
            if "work_name" in t and "RJ" in t:
              print("=== FOUND JSON SCRIPT (first 3000 chars) ===")
              print(t[:3000])
              break
          # dataタグやng-init等も探す
          for el in soup.select("[data-products],[data-works],[ng-init]"):
            print("=== FOUND DATA ELEMENT ===")
            print(str(el)[:1000])
          # __NEXT_DATA__も確認
          nd=soup.find("script",{"id":"__NEXT_DATA__"})
          if nd:
            print("=== NEXT_DATA found ===")
            print(nd.string[:2000] if nd.string else "empty")
          print("done")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
