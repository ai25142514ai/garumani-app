name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          SKIP={"ジャンル一覧","ジャンル一覧へ","お気に入り","カート","購入","レビュー","もっと見る","トップ","検索","ホーム","マイページ","通知","ヘルプ","同人誌・同人ゲーム・同人ボイス・ASMR"}
          session=requests.Session()
          session.headers.update({
            "User-Agent":UA,
            "Accept-Language":"ja,en;q=0.9",
            "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          })
          # まずトップページでCookieを取得
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)

          # ランキングAPIで直接30件取得
          RANK_API="https://www.dlsite.com/girls-touch/ranking/ajax/day?locale=ja_JP&per_page=30&page=1"
          print("Fetching ranking API...")
          r=session.get(RANK_API,timeout=30,headers={"Accept":"application/json","X-Requested-With":"XMLHttpRequest","Referer":"https://www.dlsite.com/girls-touch/ranking/day"})
          print("status:",r.status_code)
          print("content-type:",r.headers.get("content-type",""))

          items=[]
          if r.status_code==200 and "json" in r.headers.get("content-type",""):
            try:
              data=r.json()
              print("API response keys:",list(data.keys()) if isinstance(data,dict) else type(data))
              works=[]
              if isinstance(data,list):works=data
              elif isinstance(data,dict):
                works=data.get("works",data.get("items",data.get("data",data.get("ranking",[]))))
              print("works found:",len(works))
              for i,w in enumerate(works[:30]):
                wid=w.get("product_id","") or w.get("workno","")
                title=w.get("work_name","") or w.get("title","") or wid
                circle=w.get("maker_name","") or w.get("circle_name","")
                img=w.get("image_main","") or w.get("image_thum","") or w.get("img","")
                if img and img.startswith("//"):img="https:"+img
                tags=[g.get("name","") for g in w.get("genres",[]) if g.get("name","") and g.get("name","") not in SKIP]
                price=w.get("price",0) or 0
                dl_count=w.get("dl_count",0) or 0
                release_date=w.get("regist_date","") or w.get("release_date","") or ""
                site_id=w.get("site_id","girls-touch")
                wurl="https://www.dlsite.com/"+site_id+"/work/=/product_id/"+wid+".html"
                items.append({"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":release_date,"dl_count":dl_count,"price":price,"tags":tags})
                print(i+1,title[:20],"img:",bool(img),"tags:",len(tags))
            except Exception as e:
              print("JSON parse error:",e)
          
          # APIが失敗した場合はRJ番号+個別APIで取得
          if not items:
            print("Falling back to RJ+API method...")
            session.headers.update({"Referer":"https://www.dlsite.com/girls-touch/ranking/day"})
            res=session.get("https://www.dlsite.com/girls-touch/ranking/day",timeout=30)
            res.encoding="utf-8"
            matches=re.findall(r'RJ\d{6,8}',res.text)
            seen=set()
            unique=[x for x in matches if not (x in seen or seen.add(x))][:30]
            print("RJ IDs found:",len(unique))
            for i,wid in enumerate(unique):
              time.sleep(1.0)
              result=None
              for asite in ["girls-touch","girls","home"]:
                try:
                  api="https://www.dlsite.com/"+asite+"/product/info/ajax?product_id="+wid+"&cdn_cache_min=1"
                  r2=session.get(api,timeout=15,headers={"Accept":"application/json","X-Requested-With":"XMLHttpRequest"})
                  if r2.status_code!=200:continue
                  d=r2.json()
                  if wid not in d:continue
                  w=d[wid]
                  title=w.get("work_name","")
                  if not title or "同人誌・同人ゲーム" in title:continue
                  circle=w.get("maker_name","")
                  img=w.get("image_main","") or w.get("image_thum","")
                  if img and img.startswith("//"):img="https:"+img
                  tags=[g.get("name","") for g in w.get("genres",[]) if g.get("name","") and g.get("name","") not in SKIP]
                  price=w.get("price",0) or 0
                  release_date=w.get("regist_date","") or ""
                  dl_count=w.get("dl_count",0) or 0
                  site_id=w.get("site_id",asite)
                  wurl="https://www.dlsite.com/"+site_id+"/work/=/product_id/"+wid+".html"
                  result={"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":release_date,"dl_count":dl_count,"price":price,"tags":tags}
                  break
                except Exception as e:
                  print("  API",asite,"error:",e)
              if not result:
                result={"rank":i+1,"title":wid,"url":"","img":"","circle":"","author":"","release_date":"","dl_count":0,"price":0,"tags":[]}
              items.append(result)
              print(i+1,result["title"][:20],"img:",bool(result["img"]),"tags:",len(result["tags"]))

          def build_tag_data(items):
            tc={}
            for item in items:
              for tag in item.get("tags",[]):tc[tag]=tc.get(tag,0)+1
            st=sorted(tc.items(),key=lambda x:x[1],reverse=True)
            return {"tags":[{"tag":t,"count":c} for t,c in st[:30]]}
          def load_history():
            if os.path.exists("ranking_history.json"):
              with open("ranking_history.json","r",encoding="utf-8") as f:return json.load(f)
            return []
          def save_history(history,entry):
            history=[d for d in history if d.get("date_key")!=date_key]
            history.append(entry)
            history=sorted(history,key=lambda x:x["date_key"])[-90:]
            with open("ranking_history.json","w",encoding="utf-8") as f:json.dump(history,f,ensure_ascii=False,indent=2)
            return history
          rd={"date":date_str,"date_key":date_key,"items":items}
          td=build_tag_data(items)
          with open("ranking_data.json","w",encoding="utf-8") as f:json.dump(rd,f,ensure_ascii=False,indent=2)
          with open("tag_ranking.json","w",encoding="utf-8") as f:json.dump(td,f,ensure_ascii=False,indent=2)
          history=load_history()
          save_history(history,rd)
          print("done",len(items),"items")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
