name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,time,os
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9","Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8","Referer":"https://www.dlsite.com/girls-touch/"}
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)

          # ランキングページ取得
          res=session.get("https://www.dlsite.com/girls-touch/ranking/day",timeout=30)
          res.encoding="utf-8"
          soup=BeautifulSoup(res.text,"lxml")

          # RJ番号とサムネをdata属性から取得
          work_info={}
          for el in soup.select("template[data-id]"):
            wid=el.get("data-id","")
            if not wid.startswith("RJ"):continue
            samples_raw=el.get("data-samples","")
            img=""
            if samples_raw:
              m=re.search(r"'thumb':'(//[^']+_img_main[^']*)'",samples_raw)
              if m:img="https:"+m.group(1)
            if wid not in work_info:
              work_info[wid]={"img":img}

          # ランキング順序はRJ番号の出現順
          all_rj=re.findall(r'RJ\d{6,8}',res.text)
          seen=set()
          ranked=[]
          for x in all_rj:
            if x not in seen:
              seen.add(x)
              ranked.append(x)
          ranked=ranked[:30]
          print("work IDs found:",len(ranked))

          SKIP_TAGS={"マンガ","ボイス・ASMR","ボイス","ゲーム","動画","ジャンル一覧","ジャンル一覧へ","同人誌・同人ゲーム・同人ボイス・ASMR"}

          items=[]
          tag_counter={}
          for i,wid in enumerate(ranked):
            try:
              time.sleep(1.2)
              wurl="https://www.dlsite.com/girls-touch/work/=/product_id/"+wid+".html"
              wr=session.get(wurl,timeout=20,allow_redirects=True)
              wr.encoding="utf-8"
              ws=BeautifulSoup(wr.text,"lxml")

              # タイトル
              title=ws.select_one("h1#work_name")
              title=title.text.strip() if title else ""
              if not title:
                og=ws.select_one("meta[property='og:title']")
                title=og.get("content","").strip() if og else wid
              if not title or "同人誌・同人ゲーム" in title:title=wid

              # サムネ（data属性から取れなければogから）
              img=work_info.get(wid,{}).get("img","")
              if not img:
                og_img=ws.select_one("meta[property='og:image']")
                if og_img:img=og_img.get("content","")

              # タグ：テキストから直接取得
              tags=[]
              # 方法A: liタグのaタグ
              for a in ws.select("li a[href*='genre']"):
                t=a.text.strip()
                if t and t not in SKIP_TAGS and len(t)>1 and len(t)<20:
                  if t not in tags:tags.append(t)
              # 方法B: brタグを含む説明文から（フェラ等）
              if len(tags)<3:
                for br_parent in ws.select("td"):
                  txt=br_parent.get_text(separator="\n")
                  for line in txt.split("\n"):
                    line=line.strip().replace("・","")
                    if line and len(line)>1 and len(line)<15 and line not in SKIP_TAGS:
                      if line not in tags:tags.append(line)
                tags=tags[:12]

              # DL数
              dl=0
              dl_el=ws.select_one(".dl_count_total,.dl_count")
              if dl_el:
                dl_str=re.sub(r"[^\d]","",dl_el.text)
                dl=int(dl_str) if dl_str else 0

              # 価格
              price=0
              pr_el=ws.select_one(".work_price .price,.price_str")
              if pr_el:
                pr_str=re.sub(r"[^\d]","",pr_el.text)
                price=int(pr_str) if pr_str else 0

              # 発売日
              release_date=""
              for tr in ws.select("table#work_outline tr"):
                th=tr.select_one("th")
                td=tr.select_one("td")
                if th and td and "販売日" in th.text:
                  release_date=td.text.strip()[:10]
                  break

              # サークル名
              circle=""
              cr_el=ws.select_one("span.maker_name a,#work_maker a")
              if cr_el:circle=cr_el.text.strip()

              for t in tags:
                tag_counter[t]=tag_counter.get(t,0)+1

              item={
                "rank":i+1,"id":wid,"title":title,
                "img":img,"tags":tags,"dl_count":dl,
                "price":price,"release_date":release_date,
                "circle":circle,
                "url":"https://www.dlsite.com/girls-touch/work/=/product_id/"+wid+".html"
              }
              items.append(item)
              print(i+1,title[:20],"img:",bool(img),"tags:",len(tags),"dl:",dl,"date:",release_date)
            except Exception as e:
              print("error:",wid,e)
              items.append({"rank":i+1,"id":wid,"title":wid,"img":"","tags":[],"dl_count":0,"price":0,"release_date":"","circle":"","url":"https://www.dlsite.com/girls-touch/work/=/product_id/"+wid+".html"})

          # ranking_data.json
          ranking_data={"date":date_str,"items":items}
          with open("ranking_data.json","w",encoding="utf-8") as f:
            json.dump(ranking_data,f,ensure_ascii=False,indent=2)

          # tag_ranking.json
          sorted_tags=sorted(tag_counter.items(),key=lambda x:-x[1])
          tag_data={"date":date_str,"tags":[{"tag":t,"count":c} for t,c in sorted_tags[:20]]}
          with open("tag_ranking.json","w",encoding="utf-8") as f:
            json.dump(tag_data,f,ensure_ascii=False,indent=2)

          # ranking_history.json
          hist=[]
          if os.path.exists("ranking_history.json"):
            with open("ranking_history.json",encoding="utf-8") as f:
              try:hist=json.load(f)
              except:hist=[]
          hist=[d for d in hist if d.get("date_key")!=date_key]
          hist.append({"date_key":date_key,"items":[{"id":x["id"],"tags":x["tags"]} for x in items]})
          hist=sorted(hist,key=lambda x:x["date_key"])[-90:]
          with open("ranking_history.json","w",encoding="utf-8") as f:
            json.dump(hist,f,ensure_ascii=False,indent=2)

          print("done",len(items),"items")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
