name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={
            "User-Agent":UA,
            "Accept-Language":"ja,en;q=0.9",
            "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
            "Referer":"https://www.dlsite.com/girls-touch/"
          }
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)
          URL="https://www.dlsite.com/girls-touch/ranking/day"
          res=session.get(URL,timeout=30)
          res.encoding="utf-8"
          soup=BeautifulSoup(res.text,"lxml")
          SKIP={"ジャンル一覧","ジャンル一覧へ","お気に入り","カート","購入","レビュー","もっと見る","トップ","検索","ホーム","マイページ","通知","ヘルプ","同人誌・同人ゲーム・同人ボイス・ASMR"}

          # ランキングページから直接作品情報を取得
          items=[]
          rank_items=soup.select("li.ranking_item, li[class*='ranking'], div.work_item, tr.ranking_work")
          print("ranking elements found:",len(rank_items))

          # 要素が見つからない場合はRJ番号方式でフォールバック
          if len(rank_items)==0:
            print("fallback: RJ regex from page")
            # ページ内埋め込みJSONを探す
            scripts=soup.find_all("script")
            json_items=[]
            for sc in scripts:
              t=sc.string or ""
              if "work_name" in t and "RJ" in t:
                m=re.search(r'(\[[\s\S]*?"work_name"[\s\S]*?\])',t)
                if m:
                  try:
                    json_items=json.loads(m.group(1))
                    print("found embedded JSON items:",len(json_items))
                    break
                  except:pass
            if json_items:
              for i,w in enumerate(json_items[:30]):
                wid=w.get("product_id","")
                title=w.get("work_name","") or wid
                circle=w.get("maker_name","")
                img=w.get("image_main","") or w.get("image_thum","")
                if img and img.startswith("//"):img="https:"+img
                tags=[g.get("name","") for g in w.get("genres",[]) if g.get("name","") not in SKIP]
                price=w.get("price",0) or 0
                dl_count=w.get("dl_count",0) or 0
                release_date=w.get("regist_date","") or ""
                site_id=w.get("site_id","girls-touch")
                wurl="https://www.dlsite.com/"+site_id+"/work/=/product_id/"+wid+".html"
                items.append({"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":release_date,"dl_count":dl_count,"price":price,"tags":tags})
                print(i+1,title[:20],"img:",bool(img),"tags:",len(tags))
            else:
              # 最終フォールバック：RJ番号+APIで取得
              matches=re.findall(r'RJ\d{6,8}',res.text)
              seen=set()
              unique=[x for x in matches if not (x in seen or seen.add(x))][:30]
              print("RJ IDs found:",len(unique))
              API_SITES=["girls-touch","girls","home"]
              for i,wid in enumerate(unique):
                time.sleep(1.0)
                result=None
                for asite in API_SITES:
                  try:
                    api="https://www.dlsite.com/"+asite+"/product/info/ajax?product_id="+wid+"&cdn_cache_min=1"
                    r=session.get(api,timeout=15,headers={"Accept":"application/json","X-Requested-With":"XMLHttpRequest"})
                    if r.status_code!=200:continue
                    d=r.json()
                    if wid not in d:continue
                    w=d[wid]
                    title=w.get("work_name","")
                    if not title or "同人誌・同人ゲーム" in title:continue
                    circle=w.get("maker_name","")
                    img=w.get("image_main","") or w.get("image_thum","")
                    if img and img.startswith("//"):img="https:"+img
                    tags=[g.get("name","") for g in w.get("genres",[]) if g.get("name","") and g.get("name","") not in SKIP]
                    price=w.get("price",0) or 0
                    release_date=w.get("regist_date","") or ""
                    dl_count=w.get("dl_count",0) or 0
                    site_id=w.get("site_id",asite)
                    wurl="https://www.dlsite.com/"+site_id+"/work/=/product_id/"+wid+".html"
                    result={"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":release_date,"dl_count":dl_count,"price":price,"tags":tags}
                    break
                  except Exception as e:
                    print("  API",asite,"error:",e)
                if not result:
                  result={"rank":i+1,"title":wid,"url":"","img":"","circle":"","author":"","release_date":"","dl_count":0,"price":0,"tags":[]}
                items.append(result)
                print(i+1,result["title"][:20],"img:",bool(result["img"]),"tags:",len(result["tags"]))
          else:
            # ランキング要素から直接取得
            for i,el in enumerate(rank_items[:30]):
              wid_m=re.search(r'RJ\d{6,8}',str(el))
              wid=wid_m.group(0) if wid_m else ""
              title_el=el.select_one("dt.work_name a, .work_name a, a.work_name, h2 a, .title a")
              title=title_el.text.strip() if title_el else ""
              if not title and wid:title=wid
              circle_el=el.select_one(".maker_name a, .circle_name a, span.maker_name")
              circle=circle_el.text.strip() if circle_el else ""
              img_el=el.select_one("img.lazy, img[data-src], img[src*='dlsite'], img[src*='RJ']")
              img=""
              if img_el:
                img=img_el.get("data-src") or img_el.get("src","")
              if img.startswith("//"):img="https:"+img
              tags=[]
              for a in el.select("a[href*='genre'], .genre_tag a, .work_genre a"):
                t=a.text.strip()
                if t and t not in SKIP and t not in tags:tags.append(t)
              link_el=el.select_one("a[href*='product_id']")
              wurl=link_el.get("href","") if link_el else ""
              if wurl and wurl.startswith("/"):wurl="https://www.dlsite.com"+wurl
              items.append({"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":"","dl_count":0,"price":0,"tags":tags})
              print(i+1,title[:20],"img:",bool(img),"tags:",len(tags))

          print("total items:",len(items))
          def build_tag_data(items):
            tc={}
            for item in items:
              for tag in item.get("tags",[]):tc[tag]=tc.get(tag,0)+1
            st=sorted(tc.items(),key=lambda x:x[1],reverse=True)
            return {"tags":[{"tag":t,"count":c} for t,c in st[:30]]}
          def load_history():
            if os.path.exists("ranking_history.json"):
              with open("ranking_history.json","r",encoding="utf-8") as f:return json.load(f)
            return []
          def save_history(history,entry):
            history=[d for d in history if d.get("date_key")!=date_key]
            history.append(entry)
            history=sorted(history,key=lambda x:x["date_key"])[-90:]
            with open("ranking_history.json","w",encoding="utf-8") as f:json.dump(history,f,ensure_ascii=False,indent=2)
            return history
          rd={"date":date_str,"date_key":date_key,"items":items}
          td=build_tag_data(items)
          with open("ranking_data.json","w",encoding="utf-8") as f:json.dump(rd,f,ensure_ascii=False,indent=2)
          with open("tag_ranking.json","w",encoding="utf-8") as f:json.dump(td,f,ensure_ascii=False,indent=2)
          history=load_history()
          save_history(history,rd)
          print("done",len(items),"items")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
