name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={
            "User-Agent":UA,
            "Accept-Language":"ja,en;q=0.9",
            "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
            "Referer":"https://www.dlsite.com/girls/ranking/day"
          }
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls/",timeout=15)
          time.sleep(1)
          URL="https://www.dlsite.com/girls/ranking/day"
          res=session.get(URL,timeout=30)
          res.encoding="utf-8"
          matches=re.findall(r'RJ\d{6,8}',res.text)
          seen=set()
          unique=[x for x in matches if not (x in seen or seen.add(x))][:30]
          print("work IDs found:",len(unique))
          SITES=["girls","girls-touch","maniax","home"]
          SKIP={"ジャンル一覧","ジャンル一覧へ","お気に入り","カート","購入","レビュー","もっと見る","トップ","検索","ホーム","マイページ","通知","ヘルプ","同人誌・同人ゲーム・同人ボイス・ASMR"}
          def fetch_by_api(wid):
            try:
              api="https://www.dlsite.com/girls/product/info/ajax?product_id="+wid
              r=session.get(api,timeout=15,headers={"Accept":"application/json","X-Requested-With":"XMLHttpRequest"})
              d=r.json()
              if wid not in d:
                api2="https://www.dlsite.com/home/product/info/ajax?product_id="+wid
                r=session.get(api2,timeout=15,headers={"Accept":"application/json","X-Requested-With":"XMLHttpRequest"})
                d=r.json()
              if wid not in d:return None
              w=d[wid]
              title=w.get("work_name","")
              circle=w.get("maker_name","")
              img=w.get("image_main","") or w.get("image_thum","")
              if img and img.startswith("//"):img="https:"+img
              tags=[g.get("name","") for g in w.get("genres",[]) if g.get("name","") and g.get("name","") not in SKIP]
              price=w.get("price",0) or 0
              release_date=w.get("regist_date","")
              dl_count=w.get("dl_count",0) or 0
              site=w.get("site_id","girls")
              wurl="https://www.dlsite.com/"+site+"/work/=/product_id/"+wid+".html"
              return {"url":wurl,"title":title,"circle":circle,"img":img,"tags":tags,"dl_count":dl_count,"price":price,"release_date":release_date}
            except Exception as e:
              print("  API error:",e)
              return None
          def scrape_html(wid):
            for site in SITES:
              try:
                wurl="https://www.dlsite.com/"+site+"/work/=/product_id/"+wid+".html"
                wr=session.get(wurl,timeout=20,allow_redirects=True)
                wr.encoding="utf-8"
                ws=BeautifulSoup(wr.text,"lxml")
                title=ws.select_one("h1#work_name")
                title=title.text.strip() if title else ""
                if not title or "同人誌・同人ゲーム" in title:
                  og=ws.select_one("meta[property='og:title']")
                  title=og.get("content","").strip() if og else ""
                if not title or "同人誌・同人ゲーム" in title:
                  continue
                circle=ws.select_one("span.maker_name a") or ws.select_one("a.maker_name")
                circle=circle.text.strip() if circle else ""
                img=""
                for sel in ["meta[property='og:image']","img.work_thumb","img#work_main_img",".product-slider-data img",".slider-data img","img[src*='img_main']","img[src*='dlsite']"]:
                  el=ws.select_one(sel)
                  if el:
                    img=el.get("content") or el.get("src","")
                    if img:break
                if img.startswith("//"):img="https:"+img
                tags=[]
                for a in ws.select("div.main_genre a,a.genre_tag,div.work_genre a,.work_genre a,#work_genre a,td.genre a,.search_tag a"):
                  t=a.text.strip()
                  if t and t not in tags and t not in SKIP and len(t)>1:tags.append(t)
                dl_count=0
                price=0
                release_date=""
                for tr in ws.select("table#work_outline tr"):
                  th=tr.select_one("th")
                  td=tr.select_one("td")
                  if not th or not td:continue
                  lb=th.text.strip()
                  if "ダウンロード" in lb or "DL" in lb:
                    try:dl_count=int(td.text.strip().replace(",","").replace("件",""))
                    except:pass
                  elif "値段" in lb or "価格" in lb:
                    try:price=int(td.text.strip().replace(",","").replace("円","").replace("\xa5",""))
                    except:pass
                  elif "販売日" in lb:
                    release_date=td.text.strip()
                return {"url":wurl,"title":title,"circle":circle,"img":img,"tags":tags,"dl_count":dl_count,"price":price,"release_date":release_date}
              except Exception as e:
                print("  site",site,"error:",e)
            return None
          items=[]
          for i,wid in enumerate(unique):
            time.sleep(1.0)
            w=scrape_html(wid)
            if not w or not w.get("tags"):
              print("  →API fallback:",wid)
              w2=fetch_by_api(wid)
              if w2:
                if w and not w.get("tags"):
                  w2["url"]=w["url"]
                w=w2
            if w:
              w["rank"]=i+1
              w["author"]=""
              items.append(w)
              print(i+1,w["title"][:20],"img:",bool(w["img"]),"tags:",len(w["tags"]))
            else:
              print(i+1,wid,"→ 完全失敗")
              items.append({"rank":i+1,"title":wid,"url":"","img":"","circle":"","author":"","release_date":"","dl_count":0,"price":0,"tags":[]})
          def build_tag_data(items):
            tc={}
            for item in items:
              for tag in item.get("tags",[]):tc[tag]=tc.get(tag,0)+1
            st=sorted(tc.items(),key=lambda x:x[1],reverse=True)
            return {"tags":[{"tag":t,"count":c} for t,c in st[:30]]}
          def load_history():
            if os.path.exists("ranking_history.json"):
              with open("ranking_history.json","r",encoding="utf-8") as f:return json.load(f)
            return []
          def save_history(history,entry):
            history=[d for d in history if d.get("date_key")!=date_key]
            history.append(entry)
            history=sorted(history,key=lambda x:x["date_key"])[-90:]
            with open("ranking_history.json","w",encoding="utf-8") as f:json.dump(history,f,ensure_ascii=False,indent=2)
            return history
          rd={"date":date_str,"date_key":date_key,"items":items}
          td=build_tag_data(items)
          with open("ranking_data.json","w",encoding="utf-8") as f:json.dump(rd,f,ensure_ascii=False,indent=2)
          with open("tag_ranking.json","w",encoding="utf-8") as f:json.dump(td,f,ensure_ascii=False,indent=2)
          history=load_history()
          save_history(history,rd)
          print("done",len(items),"items")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
