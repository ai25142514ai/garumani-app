name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={
            "User-Agent":UA,
            "Accept-Language":"ja,en;q=0.9",
            "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
            "Referer":"https://www.dlsite.com/girls-touch/ranking/day"
          }
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)
          URL="https://www.dlsite.com/girls-touch/ranking/day"
          res=session.get(URL,timeout=30)
          res.encoding="utf-8"
          matches=re.findall(r'RJ\d{6,8}',res.text)
          seen=set()
          unique=[x for x in matches if not (x in seen or seen.add(x))][:30]
          print("work IDs found:",len(unique))
          SKIP={"ジャンル一覧","ジャンル一覧へ","お気に入り","カート","購入","レビュー","もっと見る","トップ","検索","ホーム","マイページ","通知","ヘルプ","同人誌・同人ゲーム・同人ボイス・ASMR"}
          items=[]
          for i,wid in enumerate(unique[:3]):
            try:
              time.sleep(1.2)
              wurl="https://www.dlsite.com/girls-touch/work/=/product_id/"+wid+".html"
              wr=session.get(wurl,timeout=20,allow_redirects=True)
              wr.encoding="utf-8"
              ws=BeautifulSoup(wr.text,"lxml")
              title=ws.select_one("h1#work_name")
              title=title.text.strip() if title else ""
              if not title or "同人誌・同人ゲーム" in title:
                og=ws.select_one("meta[property='og:title']")
                title=og.get("content","").strip() if og else wid
              if "同人誌・同人ゲーム" in title:title=wid
              # タグの全セレクタをデバッグ
              print("--- DEBUG",wid,"---")
              for sel in ["div.main_genre a","a.genre_tag","div.work_genre a",".work_genre a","#work_genre a","td.genre a",".search_tag a","table#work_outline td a","[class*='genre'] a"]:
                els=ws.select(sel)
                if els:
                  print("SEL",sel,"->",len(els),"件:",[e.text.strip() for e in els[:5]])
              print("--- END DEBUG ---")
            except Exception as e:
              print("error:",wid,e)
          print("done debug")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
