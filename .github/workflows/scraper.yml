name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          URL="https://www.dlsite.com/girls-touch/ranking/ajax?ranking_type=day"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9"}
          res=requests.get(URL,headers=H,timeout=30)
          res.encoding="utf-8"
          soup=BeautifulSoup(res.text,"lxml")
          print("page length:",len(res.text))
          print(res.text[:2000])
          for sel in ["tr.ranking_list_item","li.work_list_item",".n_worklist","tr.worklist"]:
            found=soup.select(sel)
            print(sel,"->",len(found))
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json || true
          git commit -m "Update ranking data" --allow-empty
          git push
