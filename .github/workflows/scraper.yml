name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,time
          from bs4 import BeautifulSoup
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9","Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8","Referer":"https://www.dlsite.com/girls-touch/"}
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)

          # ① ランキングページの構造確認
          res=session.get("https://www.dlsite.com/girls-touch/ranking/day",timeout=30)
          res.encoding="utf-8"
          soup=BeautifulSoup(res.text,"lxml")
          print("HTML length:",len(res.text))
          for li in soup.select("li")[:5]:
            if "RJ" in str(li):
              print("=== li with RJ ===")
              print(str(li)[:2000])
              break
          imgs=[i.get("src","") for i in soup.select("img") if "RJ" in i.get("src","")]
          print("img with RJ:",imgs[:5])
          for el in soup.select("[data-product-id],[data-work-id],[data-id]")[:3]:
            print("data-attr:",str(el)[:500])

          # ② 作品ページのタグ確認（HTMLテキストから直接検索）
          time.sleep(1.5)
          wurl="https://www.dlsite.com/girls-touch/work/=/product_id/RJ01538553.html"
          wr=session.get(wurl,timeout=20,allow_redirects=True)
          wr.encoding="utf-8"
          ws=BeautifulSoup(wr.text,"lxml")
          # タグっぽいキーワードをテキストから探す
          print("=== 作品ページ テキスト検索 ===")
          full_text=wr.text
          # 「中出し」「クンニ」等のワードが含まれるか
          keywords=["中出し","クンニ","クリ責め","潮吹き","巨根","フェラ","手コキ"]
          for kw in keywords:
            if kw in full_text:
              # 前後50文字を表示
              idx=full_text.index(kw)
              print("FOUND:",kw,"->",full_text[max(0,idx-30):idx+50])
          # scriptタグ内のJSONでwork_typeやgenreを探す
          for sc in ws.find_all("script"):
            t=sc.string or ""
            if "genre" in t and len(t)>100:
              print("=== script with genre (500chars) ===")
              print(t[:500])
              break
          print("done")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
