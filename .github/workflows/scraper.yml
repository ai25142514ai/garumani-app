name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,time
          from bs4 import BeautifulSoup
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9","Accept":"application/json, text/javascript, */*; q=0.01","X-Requested-With":"XMLHttpRequest","Referer":"https://www.dlsite.com/girls-touch/ranking/day"}
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls-touch/",timeout=15)
          time.sleep(1)
          # 方法1: rankingのAJAX API
          urls=[
            "https://www.dlsite.com/girls-touch/ranking/ajax/=/term/day/page/1/limit/30",
            "https://www.dlsite.com/girls-touch/ranking/ajax/day",
            "https://www.dlsite.com/girls-touch/ranking/=/term/day.json",
          ]
          for url in urls:
            try:
              r=session.get(url,timeout=15)
              print("URL:",url)
              print("Status:",r.status_code)
              print("Content-Type:",r.headers.get("Content-Type",""))
              print("Preview:",r.text[:500])
              print("---")
            except Exception as e:
              print("Error:",url,e)
          # 方法2: product/info/ajax（複数同時取得）
          print("=== product info API ===")
          try:
            r2=session.get("https://www.dlsite.com/product/info/ajax?product_id=RJ01538553,RJ01539000&cdn_cache_min=1",timeout=15)
            print("Status:",r2.status_code)
            print("Preview:",r2.text[:1000])
          except Exception as e:
            print("Error:",e)
          print("done")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
