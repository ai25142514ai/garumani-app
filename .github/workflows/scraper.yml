name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,json,os,time
          from bs4 import BeautifulSoup
          from datetime import datetime,timezone,timedelta
          JST=timezone(timedelta(hours=9))
          now=datetime.now(JST)
          date_str=now.strftime("%Y-%m-%d %H:%M")
          date_key=now.strftime("%Y-%m-%d")
          URL="https://www.dlsite.com/girls-touch/ranking/day"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9"}
          res=requests.get(URL,headers=H,timeout=30)
          res.encoding="utf-8"
          matches=re.findall(r'RJ\d{6,8}',res.text)
          seen=set()
          unique=[x for x in matches if not (x in seen or seen.add(x))][:30]
          print("work IDs found:",len(unique))
          items=[]
          for i,wid in enumerate(unique):
            try:
              time.sleep(0.8)
              wurl="https://www.dlsite.com/girls-touch/work/=/product_id/"+wid+".html"
              wr=requests.get(wurl,headers=H,timeout=20)
              wr.encoding="utf-8"
              ws=BeautifulSoup(wr.text,"lxml")
              title=ws.select_one("h1#work_name")
              title=title.text.strip() if title else wid
              circle=ws.select_one("span.maker_name a") or ws.select_one("a.maker_name")
              circle=circle.text.strip() if circle else ""
              img=ws.select_one("img.work_thumb") or ws.select_one(".slider_item img")
              img=img.get("src","") if img else ""
              if img.startswith("//"):img="https:"+img
              tags=[]
              for a in ws.select("div.main_genre a,a.genre_tag"):
                t=a.text.strip()
                if t:tags.append(t)
              dl_count=0
              price=0
              for tr in ws.select("table#work_outline tr"):
                th=tr.select_one("th")
                td=tr.select_one("td")
                if not th or not td:continue
                lb=th.text.strip()
                if "\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9" in lb or "DL" in lb:
                  try:dl_count=int(td.text.strip().replace(",","").replace("\u4ef6",""))
                  except:pass
                elif "\u5024\u6bb5" in lb or "\u4fa1\u683c" in lb:
                  try:price=int(td.text.strip().replace(",","").replace("\u5186","").replace("\xa5",""))
                  except:pass
              items.append({"rank":i+1,"title":title,"url":wurl,"img":img,"circle":circle,"author":"","release_date":"","dl_count":dl_count,"price":price,"tags":tags})
              print(i+1,title[:20])
            except Exception as e:
              print("error:",wid,e)
          def build_tag_data(items):
            tc={}
            for item in items:
              for tag in item.get("tags",[]):tc[tag]=tc.get(tag,0)+1
            st=sorted(tc.items(),key=lambda x:x[1],reverse=True)
            return {"tags":[{"tag":t,"count":c} for t,c in st[:30]]}
          def load_history():
            if os.path.exists("ranking_history.json"):
              with open("ranking_history.json","r",encoding="utf-8") as f:return json.load(f)
            return []
          def save_history(history,entry):
            history=[d for d in history if d.get("date_key")!=date_key]
            history.append(entry)
            history=sorted(history,key=lambda x:x["date_key"])[-90:]
            with open("ranking_history.json","w",encoding="utf-8") as f:json.dump(history,f,ensure_ascii=False,indent=2)
            return history
          rd={"date":date_str,"date_key":date_key,"items":items}
          td=build_tag_data(items)
          with open("ranking_data.json","w",encoding="utf-8") as f:json.dump(rd,f,ensure_ascii=False,indent=2)
          with open("tag_ranking.json","w",encoding="utf-8") as f:json.dump(td,f,ensure_ascii=False,indent=2)
          history=load_history()
          save_history(history,rd)
          print("done",len(items),"items")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
