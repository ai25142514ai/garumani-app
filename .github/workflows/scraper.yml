name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re,time
          from bs4 import BeautifulSoup
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9","Referer":"https://www.dlsite.com/girls/"}
          session=requests.Session()
          session.headers.update(H)
          session.get("https://www.dlsite.com/girls/",timeout=15)
          time.sleep(1)
          wurl="https://www.dlsite.com/girls/work/=/product_id/RJ01538553.html"
          wr=session.get(wurl,timeout=20,allow_redirects=True)
          wr.encoding="utf-8"
          ws=BeautifulSoup(wr.text,"lxml")
          # ページ全テキストを出力（最初の5000文字）
          print(ws.get_text(separator="\n",strip=True)[:5000])
          print("done")
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json
          git commit -m "Update ranking data" --allow-empty
          git push
