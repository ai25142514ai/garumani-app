name: DLsite Scraper
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run scraper
        run: |
          python - << 'PYEOF'
          import requests,re
          from bs4 import BeautifulSoup
          URL="https://www.dlsite.com/girls-touch/ranking/day"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"
          H={"User-Agent":UA,"Accept-Language":"ja,en;q=0.9"}
          res=requests.get(URL,headers=H,timeout=30)
          res.encoding="utf-8"
          matches=re.findall(r'RJ\d{6,8}',res.text)
          unique=list(set(matches))
          print("work IDs found:",len(unique))
          print("first 10:",unique[:10])
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f ranking_data.json ranking_history.json tag_ranking.json || true
          git commit -m "Update ranking data" --allow-empty
          git push
